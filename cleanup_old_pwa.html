<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Очистка PWA</title>
</head>
<body>
<h3>Очищення старого service worker</h3>
<p>Після відкриття цієї сторінки старі service worker і кеші будуть очищені.</p>
<script>
(async () => {
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) {
      await reg.unregister();
    }
  }
  if ('caches' in window) {
    const keys = await caches.keys();
    for (const key of keys) {
      await caches.delete(key);
    }
  }
  document.body.insertAdjacentHTML('beforeend', '<p><b>Готово. Можеш повертатись на CRM.</b></p>');
})();
</script>
</body>
</html>
